  # ═══════════════════════════════════════════════
  # TECHNOLOGY
  # ═══════════════════════════════════════════════

  - id: semiconductors_design
    label: "Semiconductors — Fabless Design (Nvidia, AMD, Qualcomm)"
    parent: technology
    investable: true
    etf_proxy_quality: good
    demand_drivers: ["AI training compute demand", "Data center upgrade cycle", "Consumer electronics cycle"]
    differentiation: "No manufacturing risk. Margins driven by IP, not capex. Different cycle from equipment or foundries."

  - id: semiconductors_equipment
    label: "Semiconductors — Manufacturing Equipment (ASML, AMAT, Lam)"
    parent: technology
    investable: true
    etf_proxy_quality: good
    demand_drivers: ["Fab capex cycle", "Lithography technology transitions (EUV → High-NA)", "Geopolitical reshoring capex"]
    differentiation: "Picks-and-shovels play on semiconductor buildout. Revenue lags design demand by 12-24 months. ASML monopoly on EUV is unique moat."

  - id: semiconductors_foundry
    label: "Semiconductors — Foundries (TSMC, Samsung, Intel Foundry)"
    parent: technology
    investable: true
    etf_proxy_quality: poor
    demand_drivers: ["Leading-edge node demand", "Geopolitical risk (TSMC/Taiwan concentration)", "Reshoring subsidies (CHIPS Act, EU Chips Act)"]
    differentiation: "Capex-intensive, cyclical, geopolitically exposed. TSMC single-point-of-failure for global tech supply chain."

  - id: semiconductors_memory
    label: "Semiconductors — Memory IDMs (SK Hynix, Micron, Samsung — DRAM/HBM/NAND)"
    parent: technology
    investable: true
    etf_proxy_quality: medium
    demand_drivers:
      - "HBM (High Bandwidth Memory) allocation for AI accelerators — Nvidia B200/H100 require HBM3E/HBM4"
      - "DRAM/NAND bit-pricing cycle (AI server demand vs consumer weakness)"
      - "HBM4 transition (2026) opening a new memory capex cycle"
      - "Supply-concentrated oligopoly (Hynix ~55% / Samsung ~38% / Micron ~7% HBM share) with inelastic ramp"
    differentiation: "Memory IDMs design AND manufacture commodity memory — distinct from fabless designers (semiconductors_design) they SUPPLY, and from foundries (semiconductors_foundry) that make others' designs. Cycle driven by memory bit-pricing + HBM allocation, not GPU compute or IP monetization. Geographic concentration in South Korea/Japan. Promoted from gap_20260604_semiconductors_memory (2026-06-04)."

  - id: ai_infrastructure_data_centers
    label: "AI Infrastructure — Data Centers, Cooling, Power"
    parent: technology
    investable: true
    etf_proxy_quality: medium
    demand_drivers:
      - "Hyperscaler AI capex (Microsoft, Google, Amazon, Meta)"
      - "Inference workload growth post-training boom"
      - "Power and cooling infrastructure bottleneck"

  - id: cloud_software_saas
    label: "Cloud Software & SaaS"
    parent: technology
    investable: true
    etf_proxy_quality: good
    demand_drivers: ["Enterprise IT spend", "AI feature monetization", "ARR growth rates"]

  - id: robotics_automation
    label: "Robotics & Industrial Automation"
