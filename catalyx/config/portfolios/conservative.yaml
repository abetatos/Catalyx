portfolio_id: conservative
name: Conservative
risk_profile: conservative
description: >
  Fewer, higher-conviction positions. Demands strong composite AND momentum, avoids
  crowded/exhausted narratives, and caps single-position size high so the book stays
  concentrated in validated themes. Lower turnover by design.
benchmark_etf: ACWI
construction:
  max_positions: 5
  min_composite: 60
  min_momentum: 50
  max_crowding: 60
  exclude_narrative_maturity: [crowded, exhausted]
  weighting: composite_proportional
  max_position_pct: 25
