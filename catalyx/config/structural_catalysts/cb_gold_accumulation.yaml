id: struct_cb_gold_accumulation
type: structural
schema_version: "1.2"
title: "Central bank systematic gold accumulation"
description: >
  Central banks globally — led by EM economies (China, India, Turkey, Poland, Kazakhstan) —
  have been systematically increasing gold reserves since 2022, accelerating post-2024 US
  sanctions on Russia which demonstrated that USD-denominated reserves can be frozen.
  This represents a regime shift in reserve management away from USD-denominated assets.
  It is not episodic: quarterly CB net purchases have remained above 200 tonnes since Q3 2022.
  Unlike retail or ETF demand, CB demand is price-insensitive and has long holding horizons.

