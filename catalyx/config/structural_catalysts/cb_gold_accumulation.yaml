created_by: user
onset_period: "2022-Q3"
onset_evidence: "WGC Q3 2022: CB net purchases 399T — highest since 1967. Driven by Russia sanctions precedent."

catalyst_type: institutional_flow
catalyst_subtype: central_bank_reserve_shift
geography: [GLOBAL, CHN, IND, TUR, POL, KAZ, RUS]
thematic_tags: [gold, dedollarization, reserve_diversification, geopolitical, monetary]

user_rank: 1
user_notes: >
  Confirmed by WGC quarterly data. One of the cleanest multi-year structural flows observable.
  Not priced in by equity analysts — modeled as tail risk, not base case.
  Key differentiation: CB demand is sovereign-driven, price-insensitive, not reversible quickly.

