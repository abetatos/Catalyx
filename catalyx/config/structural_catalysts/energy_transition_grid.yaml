# StructuralCatalyst: Energy Transition Grid Infrastructure Bottleneck
# schema_version: "1.3"

id: struct_energy_transition_grid
type: structural
schema_version: "1.3"
title: "Grid infrastructure as the binding constraint of energy transition"
description: >
  The energy transition (renewables, EVs, heat pumps) and the AI buildout are colliding
  at the grid level. Transmission and distribution infrastructure is the binding constraint:
  solar and wind are being built faster than the grid can connect them; EV charging and
  data centers are adding load faster than grid capacity grows. Grid investment requires
  10-15 year lead times. This creates a structural multi-decade demand for: transformers,
  cables, grid management software, and utility grid operators. Copper is the key physical
  commodity input. This structural catalyst spans: grid_infrastructure_utilities,
  copper_miners, and partially nuclear_energy (baseload).

created_at: "2026-06-03T18:00:00Z"
created_by: user
onset_period: "2023-Q2"
onset_evidence: "IEA 2023: grid investment must triple by 2030 to meet climate targets. Transformer lead times >2 years (vs
  historical 3 months)."

catalyst_type: climate_transition
catalyst_subtype: grid_electrification
