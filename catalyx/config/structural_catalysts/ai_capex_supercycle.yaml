id: struct_ai_capex_supercycle
type: structural
schema_version: "1.3"
title: "AI infrastructure capex supercycle"
description: >
  Hyperscalers (Microsoft, Google, Amazon, Meta) and sovereign AI initiatives are in a
  multi-year capex cycle for AI training and inference infrastructure. This drives demand
  for: data center construction, power infrastructure, cooling systems, networking, and
  semiconductors (GPU, HBM, ASIC). The cycle began in 2023 with ChatGPT catalyzing enterprise
  AI adoption. Unlike past tech cycles, this one is demand-inelastic: companies are compelled
  to build or risk competitive obsolescence. Combined hyperscaler AI capex guidance: ~$350B in 2026,
  growing 20-30% annually through 2028 per consensus analyst estimates.

