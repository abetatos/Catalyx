# StructuralCatalyst: Copper Demand from AI Data Center Infrastructure
# schema_version: "1.3"
# Update indicators: quarterly (hyperscaler capex earnings) + monthly (copper spot + LME inventory)
#
# Note: this is DISTINCT from struct_energy_transition_grid.
# That catalyst captures grid/EV electrification copper demand.
# This one captures the AI hyperscale infrastructure copper demand — a newer, faster-accelerating driver
# that the market has not yet fully mapped to the copper commodity.

id: struct_copper_datacenter_demand
type: structural
schema_version: "1.3"
title: "Copper demand from AI hyperscale data center buildout"
description: >
  AI data centers are a structurally new and underappreciated source of copper demand.
  A hyperscale data center (100MW+) requires 20,000–40,000 tonnes of copper — comparable
  to a mid-size copper mine's annual production — in: power transformers (windings),
  busbars, low-voltage power distribution, liquid cooling pipes, and fiber/ethernet cables.
  At $350B+ annual hyperscaler AI capex guided for 2026, the implied copper demand from
  data centers alone is estimated at 1.5–2M tonnes annually by 2028 (Wood Mackenzie),
  equivalent to ~7% of 2025 global copper mine supply.
  This demand driver is structurally different from EV/grid demand in two ways:
  (1) it is geographically concentrated (US, EU, Middle East sovereign AI) rather than
  distributed; (2) the purchase cycle is driven by hyperscaler capex decisions, not
  government policy, making it more predictable short-term.
  The market narrative still frames copper as an "EV metal". The data center angle
  is underrepresented in analyst models, creating a potential mispricing window.

created_at: "2026-06-03T20:00:00Z"
created_by: user
onset_period: "2024-Q2"
onset_evidence: >
  Q2 2024: First Wood Mackenzie report quantifying data center copper demand at scale.
  Microsoft/Google announce $100B+ combined capex for 2025. Copper spot breaks $10,000/t
  for first time since 2022, partially driven by data center demand.

catalyst_type: technology_adoption
catalyst_subtype: ai_inference_buildout
geography: [US, EU, ARE, SAU, GLOBAL]
thematic_tags: [copper, data_center, ai, infrastructure, commodities, hyperscaler]

user_rank: 2
user_notes: >
  The underappreciated angle: the market prices copper on EV + China construction.
  The AI data center demand is additive and not yet in consensus models.
  Best expression: copper miners (leveraged) or copper physical ETP for pure play.
  Key risk: demand is concentrated in a few large buyers — any hyperscaler capex cut
  hits copper disproportionately vs the distributed EV demand story.

