id: struct_nato_rearmament
type: structural
schema_version: "1.2"
title: "NATO sustained multi-year rearmament cycle"
description: >
  Following Russia's 2022 invasion of Ukraine and the 2026 NATO 3.5% GDP commitment,
  European and allied nations entered a sustained multi-year defense procurement cycle.
  This is structural because: (1) order books for prime contractors run 3-5 years,
  (2) parliamentary defense budget approvals create legal spending commitments, (3) threat
  environment shows no signs of resolution. Unlike prior defense cycles, this one has
  bipartisan political support across EU member states, making it resilient to election cycles.

