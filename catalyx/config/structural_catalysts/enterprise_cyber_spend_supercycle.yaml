narrative_maturity: mainstream
# Rationale: Goldman/JPM/MS/Barclays all publish dedicated cybersecurity sector coverage with
# base-case reports (scoring_weights.yaml 'mainstream' anchor: "Goldman/JPM/MS publish base-case reports").
# CIBR ETF AUM >$14B (well above $500M threshold). Bloomberg near-daily coverage of CRWD/PANW.
# NOT 'crowded' yet: AI threat escalation as a specific demand driver is not yet dominant in COT data,
# ZS trades below 2021 ATH despite 25% ARR growth, and the 32% YTD CIBR run is strong but not parabolic.
# Monitor transition to 'crowded' if: COT hedge fund net long in cyber names exceeds 2021 highs, OR
# CNBC runs >3 cybersecurity-dedicated segments per week.

