deactivation_conditions:
- id: deact_01
  condition: >
    Global enterprise cybersecurity spending growth decelerates below 5% YoY for two consecutive
    Gartner annual forecasts (i.e., two annual data points below $240B × 1.05 growth threshold).
  action: downgrade_to_weak

- id: deact_02
  condition: >
    CrowdStrike ARR growth falls below 10% YoY for two consecutive quarters AND Zscaler ARR growth
    falls below 10% YoY — signaling platform consolidation winner-takes-most dynamics have peaked
    and the sector is in a mature harvest phase with limited growth reinvestment.
  action: downgrade_to_weak

- id: deact_03
  condition: >
    NIS2 Directive is formally suspended or substantially weakened by EU legislation (not just
    delayed transposition), AND CMMC 2.0 program is cancelled or permanently waived by DoD.
    Both must occur simultaneously — either regulation alone is insufficient to deactivate.
  action: review_required

- id: deact_04
  condition: >
    AI threat frequency growth reverses: IBM X-Force or equivalent annual report shows YoY decline
    in exploitation attempts AND average eCrime breakout time increases above 60 minutes for two
    consecutive annual reports — indicating AI-assisted offense has been neutralized by AI defense.
  action: review_required

