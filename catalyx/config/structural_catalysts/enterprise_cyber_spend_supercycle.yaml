# StructuralCatalyst: Enterprise Cybersecurity Spend Supercycle
# schema_version: "1.3"
# Update indicators: quarterly (Gartner/IDC release, CRWD/ZS earnings) + monthly (ETF AUM flows, breach statistics)
#
# Decision rationale: STRUCTURAL, not event.
# Enterprise security spending is compounding from three non-discretionary forces simultaneously:
# (1) AI-generated threat surface expanding faster than defenses (IBM X-Force: 44% more exploitation attacks YoY),
# (2) Regulatory mandates (NIS2 enforced Oct 2024, CMMC 2.0 phased in 2025-2026) creating contractual spend obligations,
# (3) Platform consolidation wave locking 2-3 dominant vendors into multi-year ARR expansion cycles.
# None of these three forces has a discrete "event" endpoint — they are self-reinforcing secular trends.
# The momentum 92 in the sector study reflects the market moving on a thesis CATALYX has not encoded.

id: struct_enterprise_cyber_spend_supercycle
type: structural
schema_version: "1.3"
title: "Enterprise cybersecurity spend supercycle"
description: >
  Global enterprise cybersecurity spending is in a structural multi-year acceleration cycle driven
  by three compounding forces: (1) AI-enabled threat surface expansion — IBM X-Force 2026 reports a
  44% surge in exploitation of public-facing applications, adversarial AI cutting breakout times to
  27 seconds, and 82.6% of phishing attacks now AI-generated, forcing enterprises to replace legacy
  signature-based tools with behavioral AI platforms; (2) non-discretionary regulatory mandates —
  EU NIS2 (enforcement active October 2024, first sanctions issued H1 2026, fines up to €10M or 2%
  global turnover), US CMMC 2.0 (phased November 2025 through 2026), and SEC cyber disclosure rules
  (2024) creating a compliance-driven spend floor that is decoupled from macro cycles; (3) platform
  consolidation wave — enterprises collapsing multi-vendor point solutions into 2-3 dominant platforms
  (CrowdStrike, Palo Alto Networks, Zscaler), driving ARR expansion via module cross-sell (CRWD: 49%
  of customers on 6+ modules, ZS Zero Trust Everywhere customers 4x YoY). Unlike discretionary IT
  spend, cybersecurity ARR renewals are structurally sticky (CRWD gross retention 97%), making this
  cycle resilient to macro headwinds. Gartner estimates $240B in global enterprise security spend in
  2026 (+12.5% YoY from $213B). CIBR ETF AUM has grown from $5.1B to $14.5B, confirming institutional
  positioning is accelerating alongside the fundamental thesis.

created_at: "2026-06-05T12:00:00Z"
created_by: user
onset_period: "2023-Q2"
onset_evidence: >
  Gartner mid-2023 first forecast crossing $160B in enterprise security spend. CrowdStrike Q2 FY24
  ARR accelerated past $3B. NIS2 Directive formally adopted October 2022, transposition deadline
  October 2024 — enterprises began compliance procurement cycles in mid-2023 as deadline approached.

catalyst_type: technology_adoption
catalyst_subtype: enterprise_security_platform_consolidation
geography: [US, EU, GBR, APAC, GLOBAL]
thematic_tags: [cybersecurity, enterprise_saas, ai_threat_surface, regulatory, platform_consolidation, zero_trust, arr_growth]
user_rank:
user_notes: >
  First structural catalyst encoded for cybersecurity_commercial. Sector had momentum 92 with no
  registered catalyst — this closes the gap. Three indicators cover independent demand channels
  (market spend, ARR as leading indicator, threat frequency as demand driver). Regulatory indicator
  (ind_04) is qualitative but critical — NIS2 enforcement actions in 2026 are the first concrete
  signal of compliance-driven procurement. AI Security ARR sub-segment (ind_05, ZS $400M ahead of
  schedule) is the novel angle: AI-specific security spend is a NEW budget line, not a reallocation.

