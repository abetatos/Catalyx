# StructuralCatalyst: Commercial Space Revenue Supercycle
# schema_version: "1.3"
# Update indicators: monthly (Starlink subscriber data, ETF flows) + quarterly (earnings: RKLB, PL, SpaceX post-IPO)
#
# Granularity note: DISTINCT from struct_nato_rearmament.
# commercial_space is driven by private-sector subscription economics, launch unit cost curves,
# and SpaceX IPO-driven institutional capital formation — NOT government defense program cycles.
# space_defense_satellite (fed by struct_nato_rearmament) is driven by DoD/USSF appropriations,
# SDA constellation contracts, and classified program awards. Revenue mechanisms are orthogonal.

id: struct_commercial_space_supercycle
type: structural
schema_version: "1.3"
title: "Commercial space revenue supercycle — broadband subscriptions, launch economy, IPO capital formation"
description: >
  The commercial space sector is in a structural re-rating driven by three concurrent,
  self-reinforcing forces: (1) Starlink's subscription revenue ramp — from $6.9B in 2024
  to $11.4B in 2025 (+50% YoY) to a projected $20B+ in 2026 — proves the LEO broadband
  TAM is real and scalable. 10M+ active subscribers as of February 2026, gaining 20k/day.
  This SaaS-like recurring revenue model has no historical precedent in the space sector
  and anchors the sector's valuation. (2) Launch unit economics — Falcon 9 at ~$2,720/kg
  to LEO (vs $54,500/kg in the Shuttle era) has opened use cases for IoT constellations,
  commercial EO, on-orbit servicing, and satellite broadband that were previously
  uneconomic. SpaceX executing 140–156 Falcon 9 missions in 2026 (>90% of commercial
  orbital launches globally) at a cadence of approximately every 2 days creates a compounding
  infrastructure advantage. (3) SpaceX IPO (SPCX, Nasdaq, June 12 2026) at a $1.75T target
  valuation — the largest IPO in US market history — forces institutional fund managers to
  take a position on the sector for the first time, with index inclusion (Nasdaq-100 ~July 6,
  S&P 500 subsequent) requiring $22–27B in passive absorptions. This is not a single-event
  catalyst: the IPO creates a permanent institutional ownership structure, ongoing index
  rebalancing flows, and quarterly earnings transparency that sustains analyst coverage.
  Commercial space backlog crossed $500B in June 2026. The combination makes this structural,
  not episodic — the revenue model, the cost curve, and the institutional capital structure
  are all permanently changed.

created_at: "2026-06-05T10:00:00Z"
created_by: user
onset_period: "2024-Q4"
onset_evidence: >
  Starlink crossed 4M subscribers September 2024 — first proof of LEO broadband TAM at scale.
  Rocket Lab FY2024 revenue $436M (+78% YoY). Planet Labs RPO turned positive growth Q3 2024.
  SpaceX secondary market valuation surpassed $200B in late 2024. Commercial space backlog
  trajectory confirmed by NOAA Office of Space Commerce Q4 2024 report.

catalyst_type: technology_adoption
catalyst_subtype: commercial_space_revenue_maturation
geography: [US, GLOBAL, EU, APAC]
thematic_tags: [commercial_space, satellite_broadband, launch_economy, spacex_ipo, earth_observation, newspace]

user_rank: null
user_notes: >
  First commercial space structural catalyst in the system. ETF compliance constraint: no UCITS
  pure-play space ETF available as of June 2026 — UFO and ROKT are US-listed non-UCITS only.
  IPO inclusion in Nasdaq-100 (~July 6) and S&P 500 (subsequent) will create passive index
  absorptions of $22-27B — mechanically bullish for the sector in the 30-60 day window after.
  Post-IPO mean reversion risk at 90x trailing revenue ($1.75T / ~$20B projected 2026 revenue).
  Monitor narrative_maturity — transition from "emerging" to "mainstream" expected within 1-2
  months if SpaceX IPO generates sustained institutional analyst coverage.

