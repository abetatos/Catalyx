deactivation_conditions:
- id: deact_01
  condition: >
    Starlink subscribers decline for 3+ consecutive months (indicating LEO broadband TAM
    saturation or competitive displacement by Amazon Kuiper / OneWeb at scale).
  action: downgrade_to_weak

- id: deact_02
  condition: >
    SpaceX post-IPO market capitalization falls below $800B and remains there for 60+ days
    (implies structural re-rating of the sector's growth premium, not a temporary correction).
  action: review_required

- id: deact_03
  condition: >
    SpaceX Falcon 9 operational stand-down > 45 days due to FAA license suspension or
    repeated launch failures — disrupts satellite deployment timelines for all LEO operators.
  action: review_required

- id: deact_04
  condition: >
    Commercial space aggregate backlog falls below $250B (25%+ reversal from peak $500B),
    indicating sector-wide contract cancellations or demand destruction.
  action: full_deactivation

