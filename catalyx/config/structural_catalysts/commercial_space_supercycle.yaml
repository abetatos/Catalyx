  computation_note: >
    Bootstrap 2026-06-05. Three indicators: ind_01 (Starlink subscribers 10M vs strong=8M),
    ind_02 (SpaceX launch cadence 140-156/yr vs strong=100), ind_03 (commercial space backlog
    $500B+ vs strong=$300B). All three well above threshold_strong. Saturating fallback:
    ind_01 x=(10-4)/(8-4)=1.5 → score=80+(20)·(1-exp(-0.693·0.5))=80+8.8=88.8;
    ind_02 x=(148-80)/(100-80)=3.4 → score=80+(20)·(1-exp(-0.693·2.4))=80+17.4=97.4 (cap 95);
    ind_03 x=(500-200)/(300-200)=3.0 → score=80+(20)·(1-exp(-0.693·2.0))=80+15=95.
    avg ≈ (88.8+95+95)/3 ≈ 92.9 → trend flat (first entry) → 92.9 → clamp → 92.9.
    Applying conservatism for bootstrap + cold start: anchor to struct_cb_gold_accumulation (76.1)
    and struct_ai_capex_supercycle (89.9). Commercial space revenue ramp is clearly stronger
    than gold accumulation (pure institutional flow, slower-moving) but slightly weaker than
    AI capex supercycle (which has multi-trillion corporate commitment visibility). Bootstrap
    estimate: 82. Rationale: all three indicators are well above strong thresholds, trend is
    rising, but this is a cold-start file with no history — conservative relative to the
    formula's 92.9 output. Run intensity_engine --write-back after first quarterly data update.
  last_updated: "2026-06-05"
  history:
  - period: "2026-Q2"
    score: 82.0
    note: >
      Bootstrap at file creation 2026-06-05. Anchored: weaker than struct_ai_capex_supercycle (89.9),
