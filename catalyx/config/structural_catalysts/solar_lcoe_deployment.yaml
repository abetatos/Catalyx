# StructuralCatalyst: Solar LCOE Cost-Curve Decline + Policy-Driven Deployment Supercycle
# schema_version: "1.3"
# Update indicators: ind_01 quarterly (BloombergNEF LCOE), ind_02 monthly (EIA/SEIA additions),
#   ind_03 quarterly (InfoLink/PV-Tech polysilicon), ind_04 quarterly (LevelTen PPA index).
#
# Double-counting guard vs struct_energy_transition_grid:
#   struct_energy_transition_grid measures GRID BOTTLENECK severity (transformer lead times,
#   EU grid investment, copper price). It treats solar as a SOURCE of grid load, not as the
#   thesis target. This catalyst measures SOLAR DEPLOYMENT ECONOMICS: cost-curve decline,
#   policy-driven installation volumes, and AI/datacenter PPA demand for new solar capacity.
#   Zero indicator overlap. The two structurals are linked (compounding) but distinct.
#   solar_energy feeds THIS structural only; grid_infrastructure_utilities feeds struct_energy_transition_grid only.
#
# Calibration anchor (Rule 3):
#   Bootstrap score of 78 — similar to struct_cb_gold_accumulation (76.1 current).
#   Rationale: Solar has strong underlying demand and cost-curve tailwinds comparable to
#   CB gold accumulation, but the ITC cliff (July 4, 2026) introduces a near-term policy
#   headwind that suppresses intensity below struct_ai_capex_supercycle (89.9) and well
#   below struct_energy_transition_grid (95.0). The polysilicon oversupply crushes
#   manufacturer margins (ind_03 bearish) while utility-scale additions are record-high
#   (ind_02 bullish) — the bifurcated sector signal averages to a mid-high intensity.
#   First update run of intensity_engine will replace this bootstrap with computed value.

id: struct_solar_lcoe_deployment
type: structural
schema_version: "1.3"
title: "Solar LCOE cost-curve decline + policy-driven utility-scale deployment supercycle"
description: >
  Solar photovoltaic deployment is in a structural acceleration driven by three compounding
  forces: (1) Cost-curve decline — US utility-scale solar LCOE reached $39/MWh globally in
  2025 (BloombergNEF), below the marginal cost of gas peakers in most US markets; BNEF
  projects a further 30% LCOE decline by 2035 driven by module learning rates and
  storage integration. Deployment is no longer subsidy-dependent at utility scale.
  (2) AI/hyperscaler PPA demand — hyperscalers (Google, Microsoft, Amazon, Meta) have
  restructured energy procurement from sustainability commitments to operational necessity:
  Google signed >2.3 GW of solar PPAs in H1 2026 alone (TotalEnergies 1 GW Texas,
  Clearway 1.17 GW, Enlight 200 MW Oklahoma). Gigawatt-scale physical-delivery PPAs
  create a durable, policy-independent demand floor for utility-scale project developers.
  (3) Policy-driven pipeline — US utility-scale solar is on track for 43.4 GW of
  additions in 2026 (EIA, +60% YoY), the largest annual addition in US history, driven
  by ITC front-loading ahead of the OBBBA July 4, 2026 construction-start cliff.
  Globally, 698 GW of solar PV was added in 2025 (IEA), with total installed capacity
  approaching 3 TW (2,974 GW end-2025). This structural spans: solar_energy (primary),
  and is thematically linked to both struct_ai_capex_supercycle (hyperscaler PPA demand
  source) and struct_energy_transition_grid (solar load is the primary driver of grid
  interconnection congestion). Key near-term risk: ITC cliff post-July 4, 2026 causes
  H2 2026 construction-start slowdown; Chinese manufacturer margin destruction (polysilicon
  ~CNY 44/kg, below full cost for most producers) is a known headwind to the ETF but not
  to utility-scale project developers who benefit from lower module input costs.

created_at: "2026-06-05T12:00:00Z"
created_by: user
onset_period: "2023-Q1"
onset_evidence: >
  IRA enacted August 2022 established multi-decade ITC/PTC certainty; Q1 2023 utility-scale
  solar additions in US crossed 5 GW/quarter for first time. BloombergNEF 2023 LCOE report:
  US utility-scale solar hit sub-$40/MWh nationally for the first time. Both the policy
  certainty and the cost-curve crossover below gas peakers materialized simultaneously.

catalyst_type: climate_transition
catalyst_subtype: solar_lcoe_ppa_deployment
geography: [US, EU, CHN, GLOBAL]
thematic_tags: [solar, lcoe, renewables, ppa, hyperscaler, ira, itc, polysilicon, energy_transition]

user_rank: 4
user_notes: >
  Solar's primary ETF (RAYS.L for UCITS Spanish investors) is below the $200M AUM
  liquidity warning threshold. Size positions carefully. The sector is bifurcated:
  utility-scale project developers (positive cycle) vs Chinese polysilicon manufacturers
  (margin destruction). TAN/RAYS blend both sub-segments. Pure-play thesis would require
  FSLR (US thin-film, tariff-protected) or US project developer exposure — not currently
  available as a clean UCITS ETF.

