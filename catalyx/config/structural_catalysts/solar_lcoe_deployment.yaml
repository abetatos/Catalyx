deactivation_conditions:
- id: deact_01
  condition: >
    LCOE reversal: US utility-scale solar LCOE rises above $55/MWh for two consecutive
    quarterly observations (would indicate supply chain disruption or tariff shock large
    enough to impair unsubsidized project economics).
  action: review_required

- id: deact_02
  condition: >
    ITC phase-out completion and PPA demand collapse: Section 48E/45Y ITC reaches 0% AND
    North American PPA prices fall below $40/MWh for two consecutive quarters (would signal
    that the AI/hyperscaler demand floor is insufficient to sustain project developer economics
    without subsidies in the post-ITC regime).
  action: full_deactivation

- id: deact_03
  condition: >
    US utility-scale solar capacity additions fall below 15 GW annualized for two consecutive
    quarters (would indicate that the post-ITC-cliff activity cliff is more severe than
    projected and the AI/PPA demand floor has not offset the policy-driven pull-forward).
  action: downgrade_to_weak

