  update_note: >
    BloombergNEF 2025 LCOE report: global benchmark fixed-axis solar LCOE $39/MWh.
    Start of decade was ~$62/MWh. BNEF projects further 30% decline to ~$27/MWh by 2035.
    Threshold_strong at $45/MWh reflects the gas-peaker marginal cost crossover level in most
    US markets — below this, solar is competitive without subsidies. Threshold_weak at $60/MWh
    reflects the level above which deployment requires policy support to be economically viable
    at scale. Current $39/MWh is well below threshold_strong: deployment is now cost-driven,
    not policy-driven, at the utility scale.
