id: struct_japan_carry_unwind
type: structural
schema_version: "1.4"
title: "Japan monetary normalization & yen carry-trade unwind risk"
description: >
  After decades of zero/negative rates, the Bank of Japan is normalizing policy (ended NIRP +
  yield-curve-control in 2024, hiking since). Japan is the world's funding currency: a multi-
  trillion-USD yen carry trade (borrow cheap JPY → buy higher-yielding global risk assets) is
  built on that cheap funding, and Japan is the largest foreign holder of US Treasuries. As the
  BoJ hikes and JGB yields rise, two systemic channels open: (1) the carry trade can unwind
  violently — forced deleveraging across global risk assets, as the Aug-2024 episode showed
  (Nikkei −12% single day, global volatility spike); (2) rising JGB yields pull Japanese capital
  home, draining demand for USTs and pressuring global duration. This is structural, not episodic:
  it is the multi-year exit from the longest ultra-loose regime in modern finance. It is modeled
  as a WATCH/tail risk — a broad risk-off trigger — not a sector tailwind.

created_at: "2026-06-06T09:00:00Z"
created_by: user
onset_period: "2024-Q1"
onset_evidence: >
  BoJ ended negative interest rate policy and yield-curve control in March 2024 (first hike since
  2007). The Aug-2024 yen carry unwind (Nikkei −12% on 2024-08-05, global VIX spike) demonstrated
  the systemic transmission channel. By mid-2026 the policy rate reached 0.75% and the 10Y JGB
  yield passed 2.6% — the most advanced point of the normalization.

