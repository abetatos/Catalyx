# CATALYX Scoring Weights — v1.5
# Defines how dimension scores combine into composite_score for SectorSnapshot.
#
# v1.5: indicator scoring is CONTINUOUS (percentile + linear fallback, replacing the
# 🟢/🟡/🔴 semaphore buckets); trend and event-interaction adjustments are ADDITIVE
# points (not multipliers); colors are display-only, derived from the score; user_rank
# is a display ORDERING tiebreaker (no longer a score multiplier).
#
# composite = Σ(dimension_score × weight)
# Note: crowding_risk is INVERTED before weighting (high crowding → low score contribution)
#
# To recalibrate: run notebooks/calibrate_scoring_weights.ipynb after N > 50 closed theses.
#
# SCORING STABILITY RULES (v1.2 addition)
# ─────────────────────────────────────────
# Problem: LLM-assigned numeric scores (0-100) are not reproducible across sessions.
# A score of "84" from one session ≠ "84" from another. Never assign free-floating
# numbers by LLM judgment alone.
#
# Rule 1 — Compute, don't guess:
#   intensity.current_score MUST be derived from the continuous indicator scores
#   (percentile/linear, see below) — never assigned by LLM judgment.
#   Direct LLM assignment only allowed for catalyst creation (bootstrap value).
#   First update after creation must use the computed formula.
#
# Rule 2 — Use categories for qualitative dimensions:
#   narrative_maturity: enum (ignored/emerging/mainstream/crowded/exhausted)
#   is_priced_in_estimate: stepped (0 / 0.25 / 0.50 / 0.75 / 1.0) — not continuous
#   novelty_score: rubric-based (see novelty_score_rubric below)
#
# Rule 3 — Human anchors for relative comparisons:
#   When creating a new structural catalyst, set initial intensity relative to an
#   existing one: "stronger than X" / "similar to X" / "weaker than X".
#   This provides inter-catalyst calibration that persists across sessions.

# v1.6 (2026-06-06): valuation_relative REMOVED from the composite. It was a constant
# 50 placeholder (no valuation_engine), so it never changed the ranking — only diluted
# the real dimensions. A backtest (experiments/backtest_acceleration.py) confirmed that
# adding a 4th price-derived dimension (momentum acceleration) carries NEGATIVE IC at the
# monthly horizon (short-term reversal) — i.e. no price-derived metric earns that 15%.
# The 0.15 was redistributed PROPORTIONALLY across the surviving dimensions (each × 1/0.85),
# so their relative importance is unchanged; only valuation's dead weight is gone.
# The schema keeps `valuation_relative` marked deprecated for one major version (read-back
# of old snapshots) — see schemas/sector_snapshot.json.
composite_weights:
  catalyst_alignment: 0.35
  momentum: 0.29
  flow_confirmation: 0.24
  crowding_risk: 0.12  # Applied as (100 - crowding_score) × 0.12

# catalyst_alignment sub-weights (event vs structural contribution)
catalyst_alignment_sub_weights:
  event_component: 0.55    # Event catalysts are spike signals — higher immediate weight
  structural_component: 0.45  # Structural catalysts are the floor

# Momentum time-period weights (used in momentum_engine.py)
momentum_period_weights:
  return_1m: 0.20
  return_3m: 0.45
  return_6m: 0.35

# Event catalyst decay function: score = strength × exp(-lambda × days_since_detection)
# lambda = ln(2) / halflife_days
# Default halflife: 46 days (lambda ≈ 0.015)
event_catalyst_decay:
  default_halflife_days: 46
  # Override per catalyst_type defined in catalyst_taxonomy.yaml

# ─────────────────────────────────────────────────────────────────────────────
# STRUCTURAL CATALYST INTENSITY — ALGORITHMIC DERIVATION (v1.5)
# ─────────────────────────────────────────────────────────────────────────────
#
# intensity.current_score = round(clamp(indicator_avg + trend_delta, 10, 95), 1)
#
# v1.5 change — CONTINUOUS indicator scoring replaces the 🟢/🟡/🔴 semaphore buckets,
# and the trend factor becomes an ADDITIVE delta instead of a multiplier.
# ─────────────────────────────────────────────────────────────────────────────
# Why: the old semaphore mapped every indicator to one of three values (100/65/20).
# That created a CLIFF — a value just below threshold_strong scored 65, and a tiny
# move across the threshold jumped it to 100 (a 35-point discontinuity). The
# 100/65/20 anchors were arbitrary and the gaps asymmetric (45 vs 35). Chained
# multipliers (×trend) compounded into an uninterpretable, uncalibratable number.
#
# Step 1 — Score each indicator to a CONTINUOUS [0, 100] (see `indicator_scoring`):
#   method = percentile_with_saturating_fallback
#     • If the indicator has >= min_history_points values (value_history + current),
#       score = empirical percentile of current_value within its own history.
#       For lower_is_stronger, invert: score = (1 - percentile) × 100.
#     • Otherwise (cold start), a SATURATING curve anchored on the thresholds:
#         x = (value - weak) / (strong - weak)   # 0 at weak, 1 at strong (signed: the
#                                                # sign flips automatically for lower_is_stronger)
#         x ≤ 1:  score = weak_anchor + x·(strong_anchor - weak_anchor)   # linear up to strong
#         x > 1:  score = strong_anchor + (100 - strong_anchor)·(1 - exp(-decay·(x-1)))
#       Anchors: weak → 50, strong → 80. Being AT threshold_strong is 80, not 100 — the
#       headroom above is what lets values far above the threshold spread (≈90–99) instead
#       of all clamping to 100. A naive linear fallback re-saturated here because the data
#       sits far above the thresholds; the saturating curve grades by margin-over-threshold.
#   The 🟢/🟡/🔴 color is now DERIVED from this score (indicator_color_thresholds)
#   and is display-only — it no longer drives the arithmetic.
#
# Step 2 — indicator_avg = weighted mean of indicator scores
#   Override weights available via indicator_weight field (default: null = equal)
#
# Step 3 — Trend DELTA (additive) from intensity.history (last 2-3 periods):
#   ↑↑ (rising 2+ consecutive periods): +5
#   ↑  (rising 1 period):               +2
#   →  (flat, ≤2 point change):          0
#   ↓  (falling 1 period):              -3
#   ↓↓ (falling 2+ consecutive):        -7
#
# Step 4 — Clamp result to [10, 95]. Never 0 (deactivated catalysts use status field).
#
# Example: struct_cb_gold_accumulation, ind_02 COFER (strong=0.58, weak=0.62,
#   lower_is_stronger, value=0.582). Old semaphore: 🟡 = 65 (CLIFF — 95% of the way to
#   green scored the same as a mid-range value). Saturating fallback: x = (0.582-0.62)/
#   (0.58-0.62) = 0.95 → score = 50 + 0.95×30 = 78.5 → 🟡. The cliff is gone (continuous),
#   and 78.5 honestly reflects that COFER is right AT the strong threshold, not deep in green.

# CONTINUOUS indicator scoring (v1.5)
indicator_scoring:
  method: percentile_with_saturating_fallback
  min_history_points: 6        # need >= this many values before empirical percentile is used
  percentile_method: mean      # rank with ties: (n_below + 0.5·n_equal) / n
  fallback_anchors:            # cold-start saturating curve: map thresholds to these scores
    weak: 50                   # score at threshold_weak
    strong: 80                 # score at threshold_strong (headroom above → far-above values spread, not clamp)
  fallback_above_strong_decay: 0.693   # each extra (strong-weak) band above strong closes half the gap to 100
  clamp: [0, 100]              # per-indicator score bounds

# Display-only color, DERIVED from the continuous indicator score (v1.5).
# Replaces the old indicator_semaphore_scores math. Colors no longer affect numbers.
indicator_color_thresholds:
  green: 80     # score >= 80 → 🟢
  amber: 50     # 50 <= score < 80 → 🟡 ; score < 50 → 🔴

# Additive trend adjustment in score-space (v1.5). Replaces intensity_trend_factors.
intensity_trend_deltas:
  rising_2plus: 5     # ↑↑
  rising_1: 2         # ↑
  flat: 0             # →
  falling_1: -3       # ↓
  falling_2plus: -7   # ↓↓

intensity_bounds:
  min: 10   # Active catalysts never score 0 — use status: weakening/deactivated
  max: 95   # Reserve 96-100 for exceptional, user-overridden conviction

# DEPRECATED (v1.5) — kept one major version per Schema Change Protocol. Not read by
# intensity_engine anymore; indicator scoring is continuous (see indicator_scoring).
indicator_semaphore_scores:
  deprecated: true
  green: 100    # was: above threshold_strong (or below, for lower_is_stronger)
  yellow: 65    # was: between thresholds
  red: 20       # was: below threshold_weak (or above, for lower_is_stronger)

# DEPRECATED (v1.5) — superseded by intensity_trend_deltas (additive). Not read.
intensity_trend_factors:
  deprecated: true
  rising_2plus: 1.05    # ↑↑
  rising_1: 1.02        # ↑
  flat: 1.00            # →
  falling_1: 0.97       # ↓
  falling_2plus: 0.93   # ↓↓

# ─────────────────────────────────────────────────────────────────────────────
# NARRATIVE MATURITY — Categorical scale (replaces analyst_narrative_score 0-100)
# ─────────────────────────────────────────────────────────────────────────────
#
# LLMs cannot reliably produce stable 0-100 narrative scores across sessions.
# Use this 5-level categorical scale instead. Anchored with observable criteria.
#
# To classify: ask "does the sector appear in mainstream financial media with
# this thesis framing?" and match to the level below.

narrative_maturity_levels:
  ignored:
    score_equiv: 10
    description: "Thesis is absent from sell-side coverage and financial media. Only in specialist reports."
    observable_criteria: "Not in Bloomberg/FT/WSJ sector coverage. No thematic ETF flows yet."
    example: "AI data center copper demand (2024-Q3)"
  emerging:
    score_equiv: 35
    description: "Thesis present in specialist research. Starting to appear in generalist coverage."
    observable_criteria: "Present in WoodMac/CRU/specialist banks. Occasional FT/Bloomberg mention."
    example: "AI data center copper demand (2025-Q4, current)"
  mainstream:
    score_equiv: 60
    description: "Thesis is consensus view in generalist sell-side. Named in ETF product descriptions."
    observable_criteria: "Goldman/JPM/MS publish base-case reports. ETF AUM > $500M in theme."
    example: "EU defense rearmament thesis (2024)"
  crowded:
    score_equiv: 80
    description: "Thesis widely held. Contrarian signals emerging. High positioning in COT data."
    observable_criteria: "Bloomberg/CNBC daily coverage. Retail ETF inflows accelerating. Top-10 hedge fund themes."
    example: "AI semiconductors / Nvidia thesis (2025-2026)"
  exhausted:
    score_equiv: 95
    description: "Thesis fully priced in. Only momentum traders remaining. Reversal risk high."
    observable_criteria: "Thesis in mainstream press for >12 months. P/E at historical max. ETF flows reversing."
    example: "Post-pandemic EV battery metals thesis (2023)"

# ─────────────────────────────────────────────────────────────────────────────
# IS_PRICED_IN — Stepped levels (replaces continuous 0-1 float)
# ─────────────────────────────────────────────────────────────────────────────
#
# Use one of these 5 levels only. Forces categorical judgment instead of false precision.
# Assign based on the criteria below, not LLM intuition.

is_priced_in_levels:
  0.00:
    label: "Not priced"
    criteria: "Market has not yet moved on this catalyst. Position in ETF flows: neutral."
  0.25:
    label: "Partially priced — early"
    criteria: "Some institutional positioning visible. Sector has outperformed broad market <10% on this catalyst."
  0.50:
    label: "Half priced"
    criteria: "Consensus is aware but not fully positioned. Sector outperformed 10-25%."
  0.75:
    label: "Mostly priced"
    criteria: "Widely held thesis. Sector outperformed >25%. Entering requires new catalyst or mean reversion."
  1.00:
    label: "Fully priced"
    criteria: "Sector at or above fair value on this catalyst. Requires new incremental catalyst to continue."

# ─────────────────────────────────────────────────────────────────────────────
# NOVELTY SCORE RUBRIC — 5 binary questions (replaces free-float 0-100)
# ─────────────────────────────────────────────────────────────────────────────
#
# For each CatalystEvent, answer these 5 questions (yes=1, no=0).
# novelty_score = sum × 20 → range [0, 100] in steps of 20.
# Store individual answers in novelty_rubric_scores[] for auditability.

novelty_score_rubric:
  - id: nov_01
    question: "Is this catalyst different in TYPE from any other active catalyst in the system?"
    weight: 20
    example_yes: "First CB gold buying catalyst (type: institutional_flow)"
    example_no: "Second NATO budget announcement (same type as prior NATO catalyst)"
  - id: nov_02
    question: "Does this catalyst affect a sector not currently covered by any other active catalyst?"
    weight: 20
    example_yes: "Catalyst for hydrogen_clean_fuels — no other active catalyst in that sector"
    example_no: "Another AI capex catalyst for semiconductors (already covered)"
  - id: nov_03
    question: "Has the primary data source cited never appeared in the system before?"
    weight: 20
    example_yes: "First use of CFTC COT data as evidence"
    example_no: "Quarterly WGC report (used in prior catalysts)"
  - id: nov_04
    question: "Does this event change the RATE of an existing structural catalyst (not just confirm it)?"
    weight: 20
    example_yes: "NATO 3.5% GDP — changes the spending rate vs prior 2% target"
    example_no: "Another quarter of CB gold buying above 200T (confirms existing pace)"
  - id: nov_05
    question: "Is consensus_surprise > 0.5 (majority of market did not anticipate this)?"
    weight: 20
    example_yes: "Surprise rate cut when market expected hold"
    example_no: "Widely telegraphed FOMC decision"

# ─────────────────────────────────────────────────────────────────────────────
# STRUCTURAL ↔ EVENT INTERACTION (v1.5 — additive)
# ─────────────────────────────────────────────────────────────────────────────
#
# The plain additive blend (structural × 0.45 + event × 0.55) treats confirmation
# and contradiction as identical. That is wrong. We model the interaction by
# relation_to_structural — but as ADDITIVE point adjustments, not multipliers, so
# the effect is interpretable ("+10 points at full strength") and does not compound.
#
# relation_to_structural values (stored in catalyst_event.json):
#   "confirms"    → boost the structural by up to confirm_max_points
#   "contradicts" → penalise the structural by up to contradict_max_points
#   "independent" → weighted blend (structural × 0.45 + event × 0.55) — unchanged
#
# Each adjustment scales with the (decayed) event strength: full points at
# strength=100, zero at strength=0. See the CONFIRMS / CONTRADICTION blocks below.

catalyst_interaction_deltas:
  confirm_max_points: 10     # max points ADDED to structural at event_strength=100
  contradict_max_points: 15  # max points SUBTRACTED from structural at event_strength=100

# DEPRECATED (v1.5) — multiplicative factors, replaced by catalyst_interaction_deltas.
# Kept one major version per Schema Change Protocol. Still exposed by weights.py
# (confirmation_amplifier()/contradiction_dampener()) for backward compatibility,
# but catalyst_scorer.py no longer uses them.
catalyst_interaction_factors:
  deprecated: true
  confirmation_amplifier: 1.12   # was: max amplifier when event strength = 100
  contradiction_dampener: 0.82   # was: -18% to structural when event contradicts it

# ─────────────────────────────────────────────────────────────────────────────
# MULTI-CATALYST AGGREGATION — v1.5 FIX
# ─────────────────────────────────────────────────────────────────────────────
#
# A sector may have several active structural catalysts. The sector-level
# catalyst_alignment combines their (event-modified) scores.
#
# Bug in ≤v1.4: arithmetic mean. Adding a weaker catalyst DILUTED a strong one,
# so a sector with three strong catalysts could score the same as — or lower than —
# one with a single equally-strong catalyst. This contradicts the design intent
# that more confirming catalysts = stronger signal.
#
# Fix: max-anchored noisy-OR. The strongest catalyst sets the floor; each
# additional catalyst closes part of the remaining gap to 100, scaled by its own
# strength and by reinforce_factor:
#   combined = max(scores)
#   for s in sorted(scores, desc)[1:]:
#       combined += (100 - combined) × (s / 100) × reinforce_factor
#   catalyst_alignment = min(100, combined)
#
# Monotonic (adding any catalyst never lowers the score) and bounded [max, 100].
# reinforce_factor = 0.0 → only the strongest catalyst counts; 1.0 → full noisy-OR.
#
# Example: three catalysts at 95 → 95 → 96.2 → 97.1 (vs mean = 95.0).
multi_catalyst_aggregation:
  reinforce_factor: 0.25

# ─────────────────────────────────────────────────────────────────────────────
# CONFIRMS FORMULA — v1.5 (additive)
# ─────────────────────────────────────────────────────────────────────────────
#
# A confirming event ADDS points to the structural score, scaled by the event's
# (decayed) strength, with the same floor/cap guards as before.
#
# Step 1 — decay the event strength:
#   decayed = event_strength × remaining_relevance(t)
#   remaining_relevance(t) = exp(-0.693 / halflife_days × days_since_detected)
#
# Step 2 — additive boost:
#   boost = confirm_max_points × (decayed / 100)        # 10 pts at decayed=100
#   raw = structural + boost
#   case_c = structural × 0.45 + decayed × 0.55          # independent/blend formula
#   catalyst_alignment = max(structural, min(raw, case_c))
#
# Floor (max(structural, ...)): a confirming event, however weak, can never REDUCE
#   the score below what the structural catalyst produces alone.
# Cap (min(raw, case_c)): a confirming event can never outscore an equally-strong
#   independent signal — preserves the ordering confirms ≤ independent.
#
# Example: struct_nato_rearmament (88) + confirming event (decayed 91)
#   boost = 10 × 0.91 = 9.1 → raw = 97.1
#   case_c = 88 × 0.45 + 91 × 0.55 = 89.7
#   result = max(88, min(97.1, 89.7)) = 89.7
#
# Example: weak confirming event (decayed 10)
#   boost = 10 × 0.10 = 1.0 → raw = 89.0
#   case_c = 88 × 0.45 + 10 × 0.55 = 45.1
#   result = max(88, min(89.0, 45.1)) = 88  ← structural baseline preserved
#
# ─────────────────────────────────────────────────────────────────────────────
# CONTRADICTION FORMULA — v1.5 (additive)
# ─────────────────────────────────────────────────────────────────────────────
#
# A contradicting event SUBTRACTS points from the structural score, scaled by the
# event's (decayed) strength.
#
# Step 1 — decay the event strength (as above).
# Step 2 — additive penalty:
#   penalty = contradict_max_points × (decayed / 100)    # 15 pts at decayed=100
#   raw = structural - penalty
#   catalyst_alignment = max(0, min(raw, structural))
#   Cap (min(raw, structural)): a contradicting event can only reduce the structural,
#   never increase it. Floor at 0.
#
# Why additive points (vs the old ×0.82 dampener): the effect is interpretable and
# does not scale with the structural level. A strength-10 contradicting event now
# removes ~1.5 points; only strong contradictory evidence materially suppresses the
# signal — soft rumors no longer dominate.
#
# Independent formula is unchanged:
#   independent: catalyst_alignment = structural × 0.45 + decayed × 0.55

# ─────────────────────────────────────────────────────────────────────────────

# user_rank → DISPLAY ORDERING (v1.5). user_rank no longer multiplies the score.
# display_priority = algorithmic_score (intensity.current_score). Catalysts are
# ranked by algorithmic_score descending, with user_rank (1 = highest) as the
# TIE-BREAKER only. This stops a user-preferred-but-weaker catalyst from leapfrogging
# a materially stronger one, while still honoring user preference among near-equals.
user_rank_ordering:
  primary: algorithmic_score_desc
  tiebreak: user_rank_asc   # lower user_rank wins ties (1 = highest priority)

# DEPRECATED (v1.5) — replaced by user_rank_ordering. Kept one major version per
# Schema Change Protocol. No longer applied to display_priority.
user_rank_multipliers:
  deprecated: true
  1: 1.40
  2: 1.20
  3: 1.00
  4: 0.80
  5: 0.60
  default: 1.00  # unranked

# ─────────────────────────────────────────────────────────────────────────────
# MOMENTUM SCORE NORMALIZATION — v1.3
# ─────────────────────────────────────────────────────────────────────────────
#
# The composite formula uses momentum_score in [0, 100]. Raw % returns cannot
# be used directly — they need cross-sectional normalization.
#
# Step 1 — Compute raw weighted return per sector:
#   raw_momentum = return_1m_pct × 0.20 + return_3m_pct × 0.45 + return_6m_pct × 0.35
#
# Step 2 — Percentile rank across the full scored universe:
#   momentum_score = percentile_rank(raw_momentum, all_sector_raw_momentums) × 100
#   Bottom sector in universe → 0, top sector → 100.
#
# Rationale: cross-sectional percentile rank preserves relative meaning (sector A is
# stronger than B), is robust to outliers (a 200% semiconductor run doesn't compress
# all other scores to 0-5), and is consistent with how momentum is used in practice
# (relative strength, not absolute return level).
#
# Fallback when universe < 5 sectors with data:
#   momentum_score = (raw_momentum - universe_min) / (universe_max - universe_min) × 100
#   (min-max normalization, less robust but avoids degenerate cases)
#
# Phase 0 note: until momentum_engine.py is implemented, use the raw momentum_score
# from the momentum_snapshot (yfinance-derived, [0,100] via its own normalization).
# Label these scores with data_source: "phase0_yfinance_proxy" in score_breakdown.

# ─────────────────────────────────────────────────────────────────────────────
# NARRATIVE_MATURITY — MULTI-CATALYST AGGREGATION RULE — v1.3
# ─────────────────────────────────────────────────────────────────────────────
#
# A sector may have multiple active structural catalysts, each with a narrative_maturity.
# The sector-level narrative_maturity (used in heatmap and SectorSnapshot) is the MAXIMUM
# of all active catalysts' maturity levels.
#
# Ordering (least to most mature): ignored < emerging < mainstream < crowded < exhausted
#
# Rationale: crowding risk is set by the most mainstream thesis, not the average.
# If one catalyst is "crowded" (widely held), the sector faces crowding-driven positioning
# risk regardless of other catalysts being "emerging". Never average maturity levels —
# averages dilute the crowding signal.
#
# Implementation:
#   sector_narrative_maturity = max(cat.narrative_maturity for cat in active_catalysts)
#   Use the score_equiv of the winning level for the heatmap crowding_risk input.
#
# SectorStudy narrative_maturity field = apply this aggregation rule and store the result.

# ─────────────────────────────────────────────────────────────────────────────
# CLOSED THESIS RUBRICS — v1.3
# ─────────────────────────────────────────────────────────────────────────────
#
# Anchored rubrics for ClosedThesis scores that were previously free-floating LLM numbers.
# Evaluate at thesis close. Store justification in right_reason_rationale.

closed_thesis_rubrics:

  outcome_quality:
    description: "Investment OUTCOME score — measures result, not reasoning. A lucky bad thesis can score 7."
    scale:
      0:  "Full loss > 30%. Invalidation triggered, stopped out."
      1:  "Loss 20-30%. Multiple assumptions invalidated."
      2:  "Loss 10-20%. Thesis directionally wrong."
      3:  "Loss 0-10% or near-breakeven. Timing badly wrong but thesis not disproven."
      4:  "Gain 0-5% (at or below transaction costs + tax). Indeterminate outcome."
      5:  "Gain 5-15%. Thesis partially validated. Some assumptions confirmed."
      6:  "Gain 15-30%. Most assumptions validated. Clean exit within time horizon."
      7:  "Gain 30-50%. All assumptions validated at exit. Full thesis delivery."
      8:  "Gain 50-75%. Thesis fully delivered within expected_weeks horizon."
      9:  "Gain 75-100%. Exceptional. Assumptions validated ahead of schedule."
      10: "Gain > 100%. Reserve only — do not use for gains < 100% regardless of other factors."

  thesis_quality:
    description: "REASONING quality at creation time, evaluated retroactively. Independent of outcome."
    scale:
      0:  "Assumptions are vague or untestable. No falsification criteria. Sector rationale absent."
      1:  "Mostly untestable assumptions. Sector rationale weak or circular."
      2:  "Some testable assumptions but catalyst logic is speculative. No data sources cited."
      3:  "Baseline quality — a standard sector story with nothing differentiated."
      4:  "Adequate. Most assumptions testable with specific sources. Sector rationale present."
      5:  "Good. All assumptions testable with specific data sources. Clear invalidation conditions."
      6:  "Strong. Novel sector angle. Falsification criteria are tight and specific. No circular logic."
      7:  "Excellent. Catalyst was non-consensus when thesis was written. Differentiation is precise."
      8:  "Exceptional. Identified catalyst before sell-side coverage. Assumptions have clear information edge."
      9:  "Outstanding. Novel catalyst type + non-consensus sector + clean falsification. Rare."
      10: "Reserved for theses right for the exactly-right reason with full attribution confirmation."

  right_reason_score:
    description: "COMPUTED — do not estimate. Formula produces a value in [0.0, 1.0]."
    formula: |
      right_reason_score =
        (validated_assumptions / total_assumptions) × 0.40
        + (catalyst_materialized ? 0.35 : 0.0)
        + (alpha_from_catalyst ? 0.25 : 0.0)
    term_definitions:
      validated_assumptions: "count of assumption_validation entries with outcome='validated'"
      total_assumptions: "total count of assumption_validation entries (all outcomes included)"
      catalyst_materialized: |
        True ONLY if the primary mechanism described in thesis.catalyst actually occurred.
        The price must have moved via the described mechanism, not coincidentally.
        Set False if price moved in the right direction but for a different reason.
      alpha_from_catalyst: |
        True if attribution.catalyst_alpha > 0 AND attribution.attribution_confidence != 'low'.
        A 'low' confidence attribution cannot support a True value here — the decomposition
        is unreliable. False if attribution_confidence = 'low' regardless of catalyst_alpha.
    example: |
      4 assumptions, 3 validated → (3/4) × 0.40 = 0.30
      catalyst_materialized = True → + 0.35
      alpha_from_catalyst = True (catalyst_alpha=+8.2%, confidence=medium) → + 0.25
      right_reason_score = 0.30 + 0.35 + 0.25 = 0.90

# Conviction tiers → position size ceiling
conviction_tiers:
  1:
    label: "Highest conviction"
    max_position_pct: 0.12
    description: "Strong catalyst + fresh signal + low crowding + validated prior hit rate > 0.65"
  2:
    label: "High conviction"
    max_position_pct: 0.08
    description: "Good catalyst + some momentum + acceptable crowding"
  3:
    label: "Exploratory"
    max_position_pct: 0.04
    description: "Interesting thesis but high uncertainty or limited prior data"

# Correlated-catalyst combined allocation cap (portfolio concentration control)
# DISTINCT from conviction_tiers above: those size a SINGLE position by conviction.
# This caps the SUM of allocations across all open/draft theses that share the same
# primary structural catalyst — because such theses rise and fall together
# (e.g. copper_miners + grid_infrastructure both ride the AI-capex → power → metals complex).
# FLEXIBLE BY DESIGN: enforcement is "warn", not a hard block. A draft that breaches the cap
# is flagged and must carry an explicit `correlation_note` override, but is NOT prohibited.
# Rationale (2026-06-05): the old design reused the Tier-2 single-position ceiling (8%) as the
# combined cap, which was too low for a deliberately concentrated, few-sector portfolio.
correlated_catalyst_cap:
  max_combined_pct: 0.20      # combined allocation across theses sharing a primary catalyst
  enforcement: "warn"          # "warn" = flag + require override note | "block" = prohibit

# Crowding penalty derived from a sector study's narrative_maturity (added 2026-06-05)
# Single source of truth — was hardcoded in the heatmap skill + ad-hoc scripts.
# Higher maturity → more crowded → larger composite penalty (applied as 100 - crowding).
crowding_from_maturity:
  ignored: 10
  emerging: 25
  mainstream: 55
  crowded: 75
  exhausted: 90

# Catalyst lifecycle — update & deprecation thresholds (added 2026-06-05)
# governance: "auto" → the monthly review APPLIES these transitions itself and logs them
# in the report (no per-transition prompt). History is NEVER deleted — status flips to
# archived/dormant/invalidated and the object is retained.
catalyst_lifecycle:
  governance: "auto"                       # "auto" = apply + log | "ask" = prompt per transition
  # --- Update triggers ---
  event_driven_update_delta_pct: 0.10      # Step 0 live value differs >10% from YAML → force update this cycle (Rule 5 → action)
  event_promote_to_structural_cycles: 3    # an event re-detected N cycles and not decaying → promote to structural
  # --- Event deprecation ---
  event_archive_strength_below: 20         # strength_decayed floor …
  event_archive_priced_in_min: 0.75        # … AND priced_in ≥ this → status: archived
  # event reversal (policy walked back) → status: invalidated immediately, with reason (manual)
  # --- Structural deprecation ---
  structural_dormant_intensity_below: 40   # intensity < this …
  structural_dormant_consecutive_cycles: 2 # … for N consecutive review cycles → status: dormant
  structural_dormant_if_exhausted: true    # OR narrative_maturity == "exhausted" → dormant
  # dormant is reactivatable: if indicators repoint above threshold, status flips back to active

# ─────────────────────────────────────────────────────────────────────────────
# Entry-timing overlay (added 2026-06-06) — catalyx/scorer/entry_timing.py
# ─────────────────────────────────────────────────────────────────────────────
# This is an EXECUTION-TIMING overlay, NOT part of the composite. The composite answers
# WHICH sector to be in (catalyst/momentum/flow/crowding); dislocation answers IF a sector
# is cheap vs its fundamentals. entry_timing answers WHEN to enter a position you already
# decided on: avoid deploying full size into UNRESOLVED micro-tension (a falling knife) or
# right before a known near-term event (an overhang — e.g. a peer mega-IPO whale-dump risk).
# It RECOMMENDS, never trades and never moves weights (same stance as regime/dislocation).
# Thresholds live here (single source of truth, no LLM drift); the module computes facts and
# a suggested verdict, and Claude makes the final enter/scale/wait call in the skill.
entry_timing:
  lookback_days: 90          # daily-close window pulled from yfinance for the micro-tension math
  rsi_period: 14
  rsi_overbought: 70         # RSI ≥ this → chasing an extended move (mean-reversion risk)
  rsi_oversold: 30           # RSI ≤ this → falling knife (oversold, not yet stabilized)
  ma_stretch_window: 20      # MA period for the stretch_vs_ma measure
  stretch_overbought_pct: 8.0   # price > +this% above MA20 → "stretched" (wait for a pullback)
  vol_ratio_window_short: 10 # realized-vol short window (days)
  vol_ratio_window_long: 90  # realized-vol long window (days)
  vol_ratio_elevated: 1.5    # short_vol / long_vol ≥ this → elevated tension
  short_trend_window: 5      # return window for the short-term trend read
  drawdown_local_high_window: 20  # local-high lookback for drawdown_from_local_high
  # Stabilization = the discriminator between "good dip to buy" and "knife still falling".
  # The recent decline is judged STABILIZED when EITHER holds:
  stabilization_up_closes: 2     # last N daily closes are higher (sequence turning up), OR
  stabilization_reclaim_ma: 5    # price has reclaimed its N-day MA after being below it
  # State → suggested verdict mapping (Claude can override with WebSearch context):
  #   calm            → enter_now      (no tension, no overhang)
  #   stabilizing     → scale_in       (dip turning — enter in tranches)
  #   stretched       → wait_stabilize (overbought/extended — wait for a pullback)
  #   falling_unstable→ wait_stabilize (knife not stabilized — wait for it to base)
  # An event overhang in the window upgrades the verdict to wait_event regardless of micro-state.
  # Event overhang = a near-term discrete CatalystEvent touching the sector (reuse the
  # catalyst→sector resolution in catalyst_scorer.py). NO separate registry — it is a catalyst.
  overhang_window_days: 21       # |event_date - today| ≤ this counts as a near-term overhang
  overhang_magnitudes: ["high", "extreme"]  # magnitudes that qualify as a market-moving overhang
  overhang_min_strength: 60      # OR strength_score ≥ this (covers events without a magnitude)
  market_tension_ticker: "^VIX"  # market-wide risk-off backdrop gauge
  benchmark: "SPY"               # market window-return reference (mirrors dislocation)
