# CATALYX — Track record inception
#
# The FORWARD, no-look-ahead track record starts here. Before this date there is no
# point-in-time portfolio history — CATALYX evolves run to run, so projecting today's
# holdings backwards (the `mode=backtest` curve) is HYPOTHETICAL, never a track record.
#
# From inception onward, every score_run is a rebalance point: nav_engine.compute_live_nav
# values each run's actual holdings over [run_k, run_{k+1}] with real prices and CHAINS the
# segments → a genuine walk-forward equity curve (see catalyx/execution/nav_engine.py).
#
# Read via catalyx.config.weights.track_record_inception().
inception_date: "2026-06-05"
inception_release: "v1.0"

# Committed capital for the real book. The full €10,000 is allocated to this strategy
# up front, but deployed PROGRESSIVELY — a position is opened only when a macro catalyst
# materializes, never all at once. Undeployed capital sits as cash (dry powder) and is
# surfaced on the Positions page (cash = total_capital - cost basis of open positions).
# Read via catalyx.config.weights.total_capital_eur().
total_capital_eur: 10000
note: >
  Inception anchored to the first REAL position (Friday 2026-06-05) so the theoretical model
  portfolios and the real book are compared from the SAME day vs SPY. Live track record (model
  portfolios vs SPY) accrues forward from here, one score_run = one rebalance point. Any NAV
  dated before this is the hypothetical single-snapshot backtest, kept for reference only.
