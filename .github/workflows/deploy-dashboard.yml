name: Deploy CATALYX dashboard

# Builds the Evidence.dev static site (dashboard/) from the committed score-history
# parquet (data/history/*.parquet) and publishes it to GitHub Pages.
# Enable once: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'data/history/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm install

      # Project Pages serve under /<repo>, so the site must be built with that base path.
      # The committed config has no basePath (so local `npm run dev` stays at root).
      - name: Set base path for project Pages
        run: printf '\ndeployment:\n  basePath: /Catalyx\n' >> evidence.config.yaml

      - name: Ingest parquet sources
        run: npm run sources

      - name: Build static site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
